<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <img src="./balanca.png" alt="ilustração de uma balança de chão">
        <h1>Programa Cálculo do Peso Ideal</h1>
        <p>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome">
        </p>
        <p>
            <label for="sexo">Sexo:</label>
            <input type="radio" name="sexo" id="masculino">Masculino
            <input type="radio" name="sexo" id="femenino">Femenino
        </p>
        <p>
            <button id="calcular">Calcular Peso</button>
            <button id="limpar">Limpar Dados</button>
        </p>
        <p id="saida"></p>
    </main>
    <script src="./script.js"></script>
</body>
</html>
